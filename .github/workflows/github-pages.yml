name: Deploy Public Landing Page

on:
  push:
    branches:
      - master
    paths:
      - 'apps/web-admin/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build public landing page
        run: npm run build -w @solar-hub/web-admin -- --base=/solar-hub/

      - name: Add Pages marker
        run: touch apps/web-admin/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-admin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
