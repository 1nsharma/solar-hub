name: SolarHub Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. CI Builds: Backend, Web, Mobile
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Backend
        run: npm run test -w @solar-hub/backend

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Web Admin
        run: npm run build -w @solar-hub/web-admin

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build Mobile (Internal Testing)
        run: |
          cd apps/mobile
          npx eas-cli build --platform android --profile preview --non-interactive --no-wait

  # 2. Deploy Backend to Staging
  deploy-staging:
    needs: [build-backend, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying backend to staging environment..."
          # ssh user@staging-server "cd /app && git pull && pm2 restart all" (Simulated)

  # 3. QA Checks
  qa-checks:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run QA Smoke Tests
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL secret is not configured; skipping live smoke tests."
            exit 0
          fi
          npm ci
          npm run smoke -w @solar-hub/backend

  # 4. Mobile Internal Release
  mobile-internal-release:
    needs: build-mobile
    runs-on: ubuntu-latest
    steps:
      - name: Upload to Internal Testing
        run: |
          echo "EAS build was queued for internal testing. Configure EAS submit after store credentials are connected."

  # 5. Production Store Release (Manual Gate Simulation)
  production-release:
    needs: [qa-checks, mobile-internal-release]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Release to Production
        run: |
          echo "Promoting internal builds to Production Store..."
          echo "SolarHub is now Live!"
